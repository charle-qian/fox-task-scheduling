server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: fox-task-scheduling
  datasource:
    url: jdbc:h2:mem:fox_task_scheduling;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: foxTaskScheduler
      org.quartz.threadPool.threadCount: 5

app:
  security:
    admin-password: admin123

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,quartz
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  show-actuator: true
  swagger-ui:
    path: /swagger-ui.html
